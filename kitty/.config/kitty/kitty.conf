# --- Initial Window Size ---
#100 columns wide, 30 rows high (using cells)
remember_window_size no

initial_window_width  75c
initial_window_height 45c


# ~/.config/kitty/kitty.conf

allow_remote_control yes

# --- Theme ---
# Include the theme file for colors and potentially other appearance settings.
# Make sure settings below don't conflict with important ones in the theme file.
# Usually, keep font settings here in the main file.
#include ~/.cache/wal/colors-kitty.conf
#include kitty-themes/themes/Batman.conf

# --- Font Customization ---
# Choose the font family you want to use.
# Use the command `kitty +list-fonts` in your terminal to see available font names.
# Make sure the font is installed on your system!
# Examples (uncomment the one you want to use):
font_family      JetBrainsMono Nerd Font Mono
# font_family      Fira Code
# font_family      Hack
# font_family      Source Code Pro
# font_family      Cascadia Code PL

# Set the font size
font_size        12.0

# Optional: Specify bold, italic, and bold-italic variants if needed.
# Often, Kitty finds these automatically ("auto"). Only set explicitly if
# "auto" doesn't work or you want a specific weight/style.
# bold_font        auto
# italic_font      auto
# bold_italic_font auto
# Example of explicit setting:
# bold_font        JetBrains Mono Bold
# italic_font      JetBrains Mono Italic
# bold_italic_font JetBrains Mono Bold Italic

# Enable font ligatures (like -> becoming →, >= becoming ≥, etc.)
# Most modern programming fonts support these (Fira Code, JetBrains Mono, Cascadia Code...)
# Set to "none" to disable.
font_features Liga clig

# --- Other Appearance Settings (Optional - can be overridden by theme) ---
# Add other non-color settings here if you want them defined outside the theme file.

# Example: Background opacity (adjust as needed)
# background_opacity 0.95

# Example: Cursor shape (block, beam, underline)
# cursor_shape beam
# cursor_beam_thickness 1.5

# Example: Window padding
# window_padding_width 10

# --- Behavior ---
# Example: Enable right-click paste (you had this before)
mouse_map right press ungrabbed paste_from_clipboard

# Add any other custom Kitty settings you need here...
clipboard_control write-clipboard write-primary read-clipboard

